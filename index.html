<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <!-- CSS DO PROJETO -->
    <link rel="stylesheet" href="/css/style.css">
    <!-- JS DO PROJETO  -->
    <script src="/js/scripts.js" defer></script>
</head>

<body>
    <div class="calculadora">
        <input type="text" disabled id="display">
        <div class="box-buttons">
            <button class="excluir-todos">AC</button>
            <button class="btn-excluir">C</button>
            <button>/</button>
            <button>*</button>
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>-</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>+</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button class="btn-zero">0</button>
            <button>.</button>
            <button class="btn-resultado">=</button>
        </div>
    </div>
</body>

</html>
